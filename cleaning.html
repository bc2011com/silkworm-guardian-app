<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ทำความสะอาด | Silkworm Guardian App</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', system-ui, sans-serif;
      background: linear-gradient(135deg, #e8f5e8 0%, #f1f8e9 100%);
      color: #1b5e20;
      min-height: 100vh;
      padding: 16px;
    }
    .container {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      padding: 18px 16px 24px;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 14px;
      text-decoration: none;
      color: #6a1b9a;
      font-weight: 700;
      font-size: 20px;
    }
    h1 {
      text-align: center;
      font-size: 30px;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #558b2f;
      font-size: 18px;
      margin-bottom: 18px;
    }
    .card {
      background: #f9fff5;
      border: 1px solid #c5e1a5;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #2e7d32;
    }
    .check-group {
      display: grid;
      gap: 10px;
      margin: 12px 0;
    }
    .check-item {
      background: #fff;
      border: 1px solid #dcedc8;
      border-radius: 12px;
      padding: 12px;
      font-size: 18px;
    }
    .check-item input {
      transform: scale(1.2);
      margin-right: 10px;
    }
    textarea, input[type="date"], input[type="time"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #c5e1a5;
      border-radius: 12px;
      font-size: 18px;
      font-family: inherit;
      margin-top: 8px;
    }
    textarea { min-height: 90px; }
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 14px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, #689f38, #33691e);
      color: #fff;
      box-shadow: 0 6px 15px rgba(56,142,60,0.35);
    }
    .btn-secondary {
      background: #eceff1;
      color: #37474f;
    }
    .status-box {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      font-size: 17px;
    }
    .success {
      display: block;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
    }
    .history-item {
      padding: 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #dcedc8;
      margin-bottom: 10px;
      font-size: 17px;
      line-height: 1.7;
    }
    @media (max-width: 640px) {
      h1 { font-size: 24px; }
      .subtitle, .check-item, textarea, input, button { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="dashboard.html" class="back-btn">← กลับสู่หน้าหลัก</a>

    <h1>บันทึกการทำความสะอาด</h1>
    <div class="subtitle">ช่วยจดว่าทำความสะอาดอะไรบ้างในโรงเลี้ยงไหม</div>

    <div class="card">
      <h2>รายการที่ทำวันนี้</h2>

      <label>วันที่</label>
      <input type="date" id="cleanDate">

      <label style="margin-top:12px; display:block;">เวลา</label>
      <input type="time" id="cleanTime">

      <div class="check-group">
        <label class="check-item"><input type="checkbox" value="เก็บเศษใบหม่อน">เก็บเศษใบหม่อน</label>
        <label class="check-item"><input type="checkbox" value="ทำความสะอาดชั้นเลี้ยง">ทำความสะอาดชั้นเลี้ยง</label>
        <label class="check-item"><input type="checkbox" value="เก็บมูลไหม">เก็บมูลไหม</label>
        <label class="check-item"><input type="checkbox" value="เช็ดพื้น/อุปกรณ์">เช็ดพื้น/อุปกรณ์</label>
        <label class="check-item"><input type="checkbox" value="ระบายอากาศ">ระบายอากาศ</label>
      </div>

      <label>หมายเหตุเพิ่มเติม</label>
      <textarea id="cleanNote" placeholder="เช่น โรงเลี้ยงสะอาดดี มีกลิ่นอับเล็กน้อย ต้องเปิดระบายอากาศเพิ่ม"></textarea>

      <div class="btn-row">
        <button class="btn-primary" onclick="saveCleaning()">บันทึกการทำความสะอาด</button>
        <button class="btn-secondary" onclick="clearCleaning()">ล้างข้อมูล</button>
      </div>

      <div id="statusBox" class="status-box"></div>
    </div>

    <div class="card">
      <h2>ประวัติล่าสุด</h2>
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "silkworm_cleaning_logs";

    function todayISO() {
      const d = new Date();
      return d.toISOString().split("T")[0];
    }

    function loadCleaningHistory() {
      const historyList = document.getElementById("historyList");
      const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

      if (!logs.length) {
        historyList.innerHTML = '<div style="color:#757575;">ยังไม่มีประวัติการทำความสะอาด</div>';
        return;
      }

      historyList.innerHTML = logs.slice().reverse().map(item => `
        <div class="history-item">
          <strong>วันที่ ${item.date}</strong> เวลา ${item.time || "-"}<br>
          รายการ: ${item.tasks.join(", ") || "-"}<br>
          หมายเหตุ: ${item.note || "-"}
        </div>
      `).join("");
    }

    function saveCleaning() {
      const date = document.getElementById("cleanDate").value;
      const time = document.getElementById("cleanTime").value;
      const note = document.getElementById("cleanNote").value.trim();
      const tasks = [...document.querySelectorAll('input[type="checkbox"]:checked')].map(el => el.value);
      const statusBox = document.getElementById("statusBox");

      if (!date) {
        alert("กรุณาเลือกวันที่");
        return;
      }

      if (!tasks.length) {
        alert("กรุณาเลือกรายการที่ทำความสะอาดอย่างน้อย 1 รายการ");
        return;
      }

      const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      logs.push({ date, time, tasks, note, createdAt: new Date().toISOString() });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));

      statusBox.className = "status-box success";
      statusBox.textContent = "บันทึกการทำความสะอาดเรียบร้อยแล้ว";

      clearCleaning(false);
      loadCleaningHistory();
    }

    function clearCleaning(resetDate = true) {
      if (resetDate) document.getElementById("cleanDate").value = todayISO();
      document.getElementById("cleanTime").value = "";
      document.getElementById("cleanNote").value = "";
      document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
    }

    document.getElementById("cleanDate").value = todayISO();
    loadCleaningHistory();
  </script>
</body>
</html>
