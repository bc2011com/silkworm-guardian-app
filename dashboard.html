<script type="module">
  import { supabase } from "./supabase.js";
  import { requireAuth } from "./auth-guard.js";

  const todayDateEl = document.getElementById("today-date");
  const farmerNameEl = document.getElementById("farmer-name");
  const farmNameEl = document.getElementById("farm-name");
  const batchNameEl = document.getElementById("batch-name");
  const batchStatusEl = document.getElementById("batch-status");
  const instarTextEl = document.getElementById("current-instar-text");
  const logoutBtn = document.getElementById("logout-btn");

  function showThaiDate() {
    const today = new Date();
    const thaiMonths = [
      "ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.",
      "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."
    ];
    const d = today.getDate();
    const m = thaiMonths[today.getMonth()];
    const y = today.getFullYear() + 543;
    todayDateEl.textContent = `วันนี้ ${d} ${m} ${y}`;
  }

  async function loadDashboard() {
    try {
      showThaiDate();

      const result = await requireAuth();
      const user = result?.user;

      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const { data: profile, error: profileError } = await supabase
        .from("profiles")
        .select("full_name, farm_name, username")
        .eq("user_id", user.id)
        .maybeSingle();

      if (profileError) {
        console.error("โหลดโปรไฟล์ไม่ได้:", profileError);
        farmerNameEl.textContent = "ไม่พบข้อมูล";
        farmNameEl.textContent = "-";
      } else if (profile) {
        farmerNameEl.textContent = profile.full_name || profile.username || "ไม่ระบุ";
        farmNameEl.textContent = profile.farm_name || "-";
      } else {
        farmerNameEl.textContent = "ไม่พบข้อมูล";
        farmNameEl.textContent = "-";
      }

      const { data: activeBatch, error: batchError } = await supabase
        .from("silkworm_batches")
        .select("id, batch_name, is_active, current_instar, current_day")
        .eq("user_id", user.id)
        .eq("is_active", true)
        .maybeSingle();

      if (batchError) {
        console.error("โหลดข้อมูลรอบเลี้ยงไหมไม่ได้:", batchError);
        batchNameEl.textContent = "ยังไม่ได้เริ่มรอบการเลี้ยง";
        batchStatusEl.textContent = "ยังไม่สามารถโหลดข้อมูลได้";
        instarTextEl.textContent = "กรุณาตรวจสอบฐานข้อมูลรอบเลี้ยงไหม";
      } else if (!activeBatch) {
        batchNameEl.textContent = "ยังไม่ได้เริ่มรอบการเลี้ยง";
        batchStatusEl.textContent = "กดเริ่มรอบใหม่ในเมนูบันทึกข้อมูล";
        instarTextEl.textContent = "ยังไม่มีข้อมูลรอบเลี้ยงไหมในระบบ";
      } else {
        batchNameEl.textContent = activeBatch.batch_name || "รอบการเลี้ยงปัจจุบัน";
        batchStatusEl.textContent =
          `กำลังเลี้ยงไหมวัยที่ ${activeBatch.current_instar ?? "-"} (วันที่ ${activeBatch.current_day ?? "-"})`;
        instarTextEl.textContent =
          `วันนี้เลี้ยงไหมวัยที่ ${activeBatch.current_instar ?? "-"} วันที่ ${activeBatch.current_day ?? "-"} ของรอบนี้`;
      }

    } catch (error) {
      console.error("เกิดข้อผิดพลาดใน dashboard:", error);
      farmerNameEl.textContent = "ไม่พบข้อมูล";
      farmNameEl.textContent = "-";
    }
  }

  logoutBtn.addEventListener("click", async () => {
    try {
      await supabase.auth.signOut();
    } catch (e) {
      console.error("ออกจากระบบไม่สำเร็จ:", e);
    }
    window.location.href = "login.html";
  });

  loadDashboard();
</script>
