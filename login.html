<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>เข้าสู่ระบบอารักขารังไหมเลี้ยงอัจฉริยะ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Sarabun", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: #e8f5e8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      padding: 32px 28px 28px;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
      max-width: 460px;
      width: 100%;
    }

    .icon-circle {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: #e8f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      font-size: 40px;
    }

    h1 {
      font-size: 24px;
      text-align: center;
      color: #1b5e20;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 15px;
      color: #555;
      margin-bottom: 22px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 15px;
      color: #2e7d32;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 18px;
      border-radius: 14px;
      border: 1px solid #cfd8dc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
    }

    input:focus {
      border-color: #43a047;
      box-shadow: 0 0 0 2px rgba(67, 160, 71, 0.18);
    }

    .password-row {
      position: relative;
    }

    .toggle-eye {
      position: absolute;
      right: 14px;
      top: 42px;
      cursor: pointer;
      font-size: 20px;
      opacity: 0.7;
      user-select: none;
    }

    .btn {
      width: 100%;
      border: none;
      padding: 14px;
      border-radius: 999px;
      background: #2e7d32;
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s, transform 0.05s, opacity 0.2s;
    }

    .btn:hover {
      background: #1b5e20;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.75;
      cursor: not-allowed;
    }

    .link-row {
      text-align: center;
      font-size: 16px;
      margin-top: 18px;
      color: #333;
    }

    .link-row a {
      color: #1e88e5;
      text-decoration: none;
      font-weight: 600;
    }

    .link-row a:hover {
      text-decoration: underline;
    }

    .error-text {
      margin-top: 12px;
      font-size: 14px;
      color: #c62828;
      text-align: center;
      min-height: 20px;
    }

    .success-text {
      margin-top: 12px;
      font-size: 14px;
      color: #2e7d32;
      text-align: center;
      min-height: 20px;
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #666;
      line-height: 1.6;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-circle">🧵</div>
    <h1>อารักขารังไหมเลี้ยงอัจฉริยะ</h1>
    <p class="subtitle">สำหรับเกษตรกรผู้เลี้ยงไหม 5 วัย</p>

    <form id="login-form">
      <div class="form-group">
        <label for="username">ชื่อผู้ใช้</label>
        <input type="text" id="username" placeholder="เช่น farmer01" required />
      </div>

      <div class="form-group password-row">
        <label for="password">รหัสผ่าน</label>
        <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required />
        <span id="toggle-password" class="toggle-eye">👁️</span>
      </div>

      <button type="submit" class="btn" id="login-btn">เข้าสู่ระบบ</button>

      <div class="error-text" id="error-text"></div>
      <div class="success-text" id="success-text"></div>

      <p class="link-row">
        ยังไม่มีบัญชีผู้ใช้? <a href="register.html">สมัครสมาชิก</a>
      </p>

      <p class="hint">
        * ใช้ “ชื่อผู้ใช้” และ “รหัสผ่าน” ที่สมัครไว้<br />
        * หากลืมรหัสผ่าน กรุณาติดต่อผู้ดูแลระบบ
      </p>
    </form>
  </div>

  <script type="module">
    import { supabase } from "./supabase.js";

    const form = document.getElementById("login-form");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const togglePasswordBtn = document.getElementById("toggle-password");
    const errorText = document.getElementById("error-text");
    const successText = document.getElementById("success-text");
    const loginBtn = document.getElementById("login-btn");

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.textContent = isLoading ? "กำลังเข้าสู่ระบบ..." : "เข้าสู่ระบบ";
    }

    function sanitizeUsername(username) {
      return username.trim().toLowerCase().replace(/[^a-z0-9_]/g, "");
    }

    function makeInternalEmail(username) {
      return `${username}@silkworm.local`;
    }

    togglePasswordBtn.addEventListener("click", () => {
      passwordInput.type = passwordInput.type === "password" ? "text" : "password";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorText.textContent = "";
      successText.textContent = "";

      const rawUsername = usernameInput.value.trim();
      const username = sanitizeUsername(rawUsername);
      const password = passwordInput.value;

      if (!rawUsername || !password) {
        errorText.textContent = "กรุณากรอกชื่อผู้ใช้และรหัสผ่าน";
        return;
      }

      if (username.length < 3) {
        errorText.textContent = "ชื่อผู้ใช้ไม่ถูกต้อง";
        return;
      }

      setLoading(true);

      try {
        const internalEmail = makeInternalEmail(username);

        const { data, error } = await supabase.auth.signInWithPassword({
          email: internalEmail,
          password: password
        });

        if (error) {
          console.error("signIn error:", error);
          errorText.textContent = "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";
          return;
        }

        if (!data.user) {
          errorText.textContent = "ไม่พบบัญชีผู้ใช้ในระบบ";
          return;
        }

        successText.textContent = "เข้าสู่ระบบสำเร็จ กำลังเข้าสู่หน้าหลัก...";

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 800);

      } catch (err) {
        console.error("unexpected login error:", err);
        errorText.textContent = "เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง";
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
