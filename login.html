<script type="module">
import { supabase } from "./supabase.js";

const form = document.getElementById("login-form");
const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");
const togglePasswordBtn = document.getElementById("toggle-password");
const errorText = document.getElementById("error-text");
const loginBtn = document.getElementById("login-btn");

function setLoading(isLoading) {
  loginBtn.disabled = isLoading;
  loginBtn.textContent = isLoading ? "กำลังเข้าสู่ระบบ..." : "เข้าสู่ระบบ";
}

// ปุ่มโชว์/ซ่อนรหัสผ่าน
togglePasswordBtn.addEventListener("click", () => {
  const type = passwordInput.type === "password" ? "text" : "password";
  passwordInput.type = type;
});

// แปลง username เป็น email ภายในระบบ
function makeInternalEmail(username){
  return username + "@silkworm.local";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorText.textContent = "";

  const username = usernameInput.value.trim().toLowerCase();
  const password = passwordInput.value;

  if (!username || !password) {
    errorText.textContent = "กรุณากรอกชื่อผู้ใช้และรหัสผ่าน";
    return;
  }

  setLoading(true);

  try {

    // สร้าง email จาก username
    const email = makeInternalEmail(username);

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      console.error(error);
      errorText.textContent = "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";
      setLoading(false);
      return;
    }

    // login สำเร็จ
    window.location.href = "dashboard.html";

  } catch (err) {
    console.error(err);
    errorText.textContent = "เกิดข้อผิดพลาด กรุณาลองใหม่";
  } finally {
    setLoading(false);
  }
});
</script>
