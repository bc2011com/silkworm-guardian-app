<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ไหมคำ AI</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">

<style>

body{
font-family:Sarabun;
background:linear-gradient(135deg,#e8f5e8,#f1f8e9);
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
}

h1{
text-align:center;
color:#1b5e20;
}

.chatbox{
height:300px;
border:1px solid #ddd;
overflow:auto;
padding:10px;
margin-top:10px;
}

input{
width:100%;
padding:12px;
font-size:18px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
background:#2e7d32;
color:white;
border-radius:20px;
}

</style>
</head>

<body>

<div class="container">

<a href="dashboard.html">← กลับ</a>

<h1>คุยกับไหมคำ</h1>

<div class="chatbox" id="chat"></div>

<input id="msg" placeholder="ถามไหมคำ...">

<button onclick="send()">ส่ง</button>

</div>

<script>

function send(){

const msg=document.getElementById("msg").value

const chat=document.getElementById("chat")

chat.innerHTML+="<p>👩‍🌾 "+msg+"</p>"

let reply=""

if(msg.includes("อาหาร"))
reply="ไหมวัยเล็กให้ใบหม่อนอ่อน"

else if(msg.includes("ร้อน"))
reply="อุณหภูมิที่เหมาะสม 25-28 องศา"

else
reply="ไหมคำกำลังเรียนรู้ โปรดลองถามใหม่"

chat.innerHTML+="<p>🐛 "+reply+"</p>"

document.getElementById("msg").value=""

}

</script>

</body>
</html>
