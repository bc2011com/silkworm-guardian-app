<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>สมัครสมาชิกเกษตรกรเลี้ยงไหม</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Sarabun", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: #e8f5e8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      padding: 32px 28px 28px;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
      max-width: 520px;
      width: 100%;
    }

    .icon-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #e3f2fd;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      font-size: 42px;
    }

    h1 {
      font-size: 22px;
      text-align: center;
      color: #1b5e20;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #555;
      margin-bottom: 22px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 15px;
      color: #2e7d32;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 18px;
      border-radius: 14px;
      border: 1px solid #cfd8dc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #43a047;
      box-shadow: 0 0 0 2px rgba(67, 160, 71, 0.18);
    }

    .btn {
      width: 100%;
      border: none;
      padding: 14px;
      border-radius: 999px;
      background: #2e7d32;
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s, transform 0.05s, opacity 0.2s;
    }

    .btn:hover {
      background: #1b5e20;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }

    .link-row {
      text-align: center;
      font-size: 16px;
      margin-top: 18px;
      color: #333;
    }

    .link-row a {
      color: #1e88e5;
      text-decoration: none;
      font-weight: 600;
    }

    .link-row a:hover {
      text-decoration: underline;
    }

    .error-text {
      margin-top: 12px;
      font-size: 14px;
      color: #c62828;
      text-align: center;
      min-height: 20px;
    }

    .success-text {
      margin-top: 12px;
      font-size: 14px;
      color: #2e7d32;
      text-align: center;
      min-height: 20px;
    }

    .helper-box {
      margin-top: 10px;
      background: #f6fbf6;
      border: 1px solid #dcefdc;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      color: #355e3b;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-circle">🧵</div>
    <h1>สมัครสมาชิกเกษตรกรเลี้ยงไหม</h1>
    <p class="subtitle">ใช้บัญชีนี้เข้าสู่ระบบอารักขารังไหมเลี้ยงอัจฉริยะ</p>

    <form id="register-form">
      <div class="form-group">
        <label for="full_name">ชื่อ–สกุลผู้เลี้ยงไหม</label>
        <input type="text" id="full_name" placeholder="เช่น นางสมใจ ใจดี" required />
      </div>

      <div class="form-group">
        <label for="farm_name">ชื่อฟาร์ม / กลุ่มเกษตรกร</label>
        <input type="text" id="farm_name" placeholder="เช่น กลุ่มเลี้ยงไหมบ้านดาดนา" required />
      </div>

      <div class="form-group">
        <label for="username">ชื่อผู้ใช้ (ใช้ตอนเข้าสู่ระบบ)</label>
        <input type="text" id="username" placeholder="เช่น farmer01" required />
      </div>

      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <input type="password" id="password" placeholder="อย่างน้อย 6 ตัวอักษร" required />
      </div>

      <div class="form-group">
        <label for="confirm_password">ยืนยันรหัสผ่านอีกครั้ง</label>
        <input type="password" id="confirm_password" placeholder="กรอกรหัสผ่านซ้ำอีกครั้ง" required />
      </div>

      <button type="submit" class="btn" id="submit-btn">สมัครสมาชิก</button>

      <div class="error-text" id="error-text"></div>
      <div class="success-text" id="success-text"></div>

      <p class="link-row">
        มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบที่นี่</a>
      </p>

      <div class="helper-box">
        ระบบจะใช้ “ชื่อผู้ใช้” และ “รหัสผ่าน” เป็นหลักในการใช้งาน<br />
        กรุณาจดชื่อผู้ใช้และรหัสผ่านเก็บไว้ เพื่อป้องกันลืม
      </div>
    </form>
  </div>

  <script type="module">
    import { supabase } from "./supabase.js";

    const form = document.getElementById("register-form");
    const fullNameInput = document.getElementById("full_name");
    const farmNameInput = document.getElementById("farm_name");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirm_password");

    const errorText = document.getElementById("error-text");
    const successText = document.getElementById("success-text");
    const submitBtn = document.getElementById("submit-btn");

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "กำลังสมัครสมาชิก..." : "สมัครสมาชิก";
    }

    function clearMessages() {
      errorText.textContent = "";
      successText.textContent = "";
    }

    function sanitizeUsername(username) {
      return username.trim().toLowerCase().replace(/[^a-z0-9_]/g, "");
    }

    function makeInternalEmail(username) {
      return `${username}@silkworm.local`;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessages();

      const full_name = fullNameInput.value.trim();
      const farm_name = farmNameInput.value.trim();
      const rawUsername = usernameInput.value.trim();
      const username = sanitizeUsername(rawUsername);
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!full_name || !farm_name || !rawUsername || !password || !confirmPassword) {
        errorText.textContent = "กรุณากรอกข้อมูลให้ครบทุกช่อง";
        return;
      }

      if (username.length < 3) {
        errorText.textContent = "ชื่อผู้ใช้ควรมีอย่างน้อย 3 ตัวอักษร และใช้ได้เฉพาะ a-z, 0-9, _";
        return;
      }

      if (password.length < 6) {
        errorText.textContent = "รหัสผ่านควรมีอย่างน้อย 6 ตัวอักษร";
        return;
      }

      if (password !== confirmPassword) {
        errorText.textContent = "รหัสผ่านและยืนยันรหัสผ่านไม่ตรงกัน";
        return;
      }

      setLoading(true);

      try {
        // ตรวจว่าชื่อผู้ใช้ซ้ำหรือยัง
        const { data: existingProfile, error: existingProfileError } = await supabase
          .from("profiles")
          .select("id")
          .eq("username", username)
          .maybeSingle();

        if (existingProfileError) {
          console.error("existingProfileError:", existingProfileError);
          errorText.textContent = "ตรวจสอบชื่อผู้ใช้ไม่สำเร็จ กรุณาลองใหม่";
          return;
        }

        if (existingProfile) {
          errorText.textContent = "ชื่อผู้ใช้นี้ถูกใช้แล้ว กรุณาเปลี่ยนชื่อผู้ใช้";
          return;
        }

        // สร้างอีเมลภายในระบบจาก username เพื่อใช้กับ Supabase Auth
        const internalEmail = makeInternalEmail(username);

        // สมัครสมาชิกใน Supabase Auth
        const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
          email: internalEmail,
          password: password
        });

        if (signUpError) {
          console.error("signUpError:", signUpError);

          if (signUpError.message?.toLowerCase().includes("already registered")) {
            errorText.textContent = "ชื่อผู้ใช้นี้มีอยู่แล้วในระบบ กรุณาใช้ชื่ออื่น";
          } else {
            errorText.textContent = "สมัครสมาชิกไม่สำเร็จ: " + signUpError.message;
          }
          return;
        }

        const user = signUpData?.user;
        if (!user) {
          errorText.textContent = "ไม่สามารถสร้างบัญชีผู้ใช้ได้ กรุณาลองใหม่อีกครั้ง";
          return;
        }

        // บันทึกข้อมูลโปรไฟล์
        const { error: profileError } = await supabase
          .from("profiles")
          .insert({
            user_id: user.id,
            full_name: full_name,
            farm_name: farm_name,
            username: username
          });

        if (profileError) {
          console.error("profileError:", profileError);
          errorText.textContent =
            "สร้างบัญชีสำเร็จ แต่บันทึกข้อมูลเกษตรกรไม่สำเร็จ: " + profileError.message;
          return;
        }

        successText.textContent = "สมัครสมาชิกสำเร็จ! กำลังพาไปหน้าเข้าสู่ระบบ...";
        form.reset();

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);

      } catch (err) {
        console.error("unexpected error:", err);
        errorText.textContent = "เกิดข้อผิดพลาดที่ไม่คาดคิด กรุณาลองใหม่อีกครั้ง";
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
