<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>สมัครสมาชิกเกษตรกรเลี้ยงไหม</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Sarabun", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: #e8f5e8;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      padding: 32px 28px 28px;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.06);
      max-width: 480px;
      width: 100%;
    }

    .icon-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #e3f2fd;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 40px;
    }

    h1 {
      font-size: 22px;
      text-align: center;
      color: #1b5e20;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #2e7d32;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border-radius: 12px;
      border: 1px solid #cfd8dc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #43a047;
      box-shadow: 0 0 0 2px rgba(67,160,71,0.18);
    }

    .btn {
      width: 100%;
      border: none;
      padding: 12px;
      border-radius: 999px;
      background: #2e7d32;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.05s;
    }

    .btn:hover {
      background: #1b5e20;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: #666;
      line-height: 1.5;
    }

    .link-row {
      text-align: center;
      font-size: 14px;
      margin-top: 16px;
      color: #333;
    }

    .link-row a {
      color: #1e88e5;
      text-decoration: none;
      font-weight: 600;
    }

    .link-row a:hover {
      text-decoration: underline;
    }

    .error-text {
      margin-top: 10px;
      font-size: 13px;
      color: #c62828;
      text-align: center;
    }

    .success-text {
      margin-top: 10px;
      font-size: 13px;
      color: #2e7d32;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-circle">🧵</div>
    <h1>สมัครสมาชิกเกษตรกรเลี้ยงไหม</h1>
    <p class="subtitle">ใช้บัญชีนี้เข้าสู่ระบบอารักขารังไหมเลี้ยงอัจฉริยะ</p>

    <form id="register-form">
      <div class="form-group">
        <label for="full_name">ชื่อ–สกุลผู้เลี้ยงไหม</label>
        <input type="text" id="full_name" placeholder="เช่น นางสมใจ ใจดี" required />
      </div>

      <div class="form-group">
        <label for="farm_name">ชื่อฟาร์ม / กลุ่มเกษตรกร</label>
        <input type="text" id="farm_name" placeholder="เช่น กลุ่มเลี้ยงไหมบ้านดาดนา" required />
      </div>

      <div class="form-group">
        <label for="username">ชื่อผู้ใช้ (ใช้ตอนเข้าสู่ระบบ)</label>
        <input type="text" id="username" placeholder="เช่น farmer01" required />
      </div>

      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <input type="password" id="password" placeholder="อย่างน้อย 6 ตัวอักษร" required />
      </div>

      <div class="form-group">
        <label for="confirm_password">ยืนยันรหัสผ่านอีกครั้ง</label>
        <input type="password" id="confirm_password" placeholder="กรอกรหัสผ่านซ้ำอีกครั้ง" required />
      </div>

      <button type="submit" class="btn" id="submit-btn">สมัครสมาชิก</button>

      <div class="error-text" id="error-text"></div>
      <div class="success-text" id="success-text"></div>

      <p class="link-row">
        มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบที่นี่</a>
      </p>

      <p class="hint">
        * แนะนำให้เกษตรกรบันทึก “ชื่อผู้ใช้” และ “รหัสผ่าน” ลงในสมุด หรือบันทึกไว้ในโทรศัพท์เพื่อป้องกันลืม<br />
        * อีเมลใช้สำหรับการกู้รหัสผ่านภายหลัง (ให้เจ้าหน้าที่ช่วยรีเซ็ต)
      </p>
    </form>
  </div>

  <script type="module">
    import { supabase } from "./supabase.js";

    const form = document.getElementById("register-form");
    const fullNameInput = document.getElementById("full_name");
    const farmNameInput = document.getElementById("farm_name");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirm_password");

    const errorText = document.getElementById("error-text");
    const successText = document.getElementById("success-text");
    const submitBtn = document.getElementById("submit-btn");

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "กำลังสมัครสมาชิก..." : "สมัครสมาชิก";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorText.textContent = "";
      successText.textContent = "";

      const full_name = fullNameInput.value.trim();
      const farm_name = farmNameInput.value.trim();
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!full_name || !farm_name || !username || !password || !confirmPassword) {
        errorText.textContent = "กรุณากรอกข้อมูลให้ครบทุกช่อง";
        return;
      }

      if (password.length < 6) {
        errorText.textContent = "รหัสผ่านควรมีอย่างน้อย 6 ตัวอักษร";
        return;
      }

      if (password !== confirmPassword) {
        errorText.textContent = "รหัสผ่านและยืนยันรหัสผ่านไม่ตรงกัน";
        return;
      }

      setLoading(true);

      try {
        // 1) สมัครสมาชิกใน Supabase Auth (password)
        const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
          email,
          password
        });

        if (signUpError) {
          console.error(signUpError);
          errorText.textContent = "สมัครสมาชิกไม่สำเร็จ: " + signUpError.message;
          setLoading(false);
          return;
        }

        const user = signUpData.user;
        if (!user) {
          errorText.textContent = "ไม่สามารถสร้างบัญชีผู้ใช้ได้ กรุณาลองใหม่อีกครั้ง";
          setLoading(false);
          return;
        }

        // 2) บันทึกข้อมูลโปรไฟล์ลงตาราง public.profiles
        const { error: profileError } = await supabase.from("profiles").insert({
          user_id: user.id,
          full_name,
          username,
          farm_name,
      
        });

        if (profileError) {
          console.error(profileError);
          errorText.textContent =
            "สร้างบัญชีในระบบ Auth สำเร็จ แต่บันทึกข้อมูลโปรไฟล์ไม่สำเร็จ: " +
            profileError.message;
          setLoading(false);
          return;
        }

        successText.textContent = "สมัครสมาชิกสำเร็จ! กำลังพาไปหน้าเข้าสู่ระบบ...";

        // เคลียร์ฟอร์ม
        form.reset();

        // รอแป๊บเดียวแล้วพาไปหน้า login
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);
      } catch (err) {
        console.error(err);
        errorText.textContent = "เกิดข้อผิดพลาดที่ไม่คาดคิด กรุณาลองใหม่อีกครั้ง";
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
